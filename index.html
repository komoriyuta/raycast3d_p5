<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>p5.js Raycast 3D（レイキャスト入門）</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <h1>🎮 p5.js Raycast 3D（レイキャスト入門）</h1>
            <p class="note">
                【操作方法】<br />
                <strong>W</strong>：前に進む　
                <strong>S</strong>：後ろに下がる　
                <strong>A</strong>：左に横移動　
                <strong>D</strong>：右に横移動　 <strong>←</strong>：左を向く　
                <strong>→</strong>：右を向く
            </p>
            <p class="description">
                このゲームは「レイキャスト」という技術で3D風の画面を作っています。<br />
                左上のミニマップを見ながら迷路を探検してみよう！
            </p>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
        <script src="main.js"></script>
        <script src="sketch.js"></script>
    </body>
</html>
